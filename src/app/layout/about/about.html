<section class="py-24 px-6 bg-slate-50 dark:bg-slate-900/50" id="about">
<div class="max-w-6xl mx-auto">
<div class="grid md:grid-cols-2 gap-16 items-center">
<div class="relative group">
<div class="absolute -inset-4 bg-primary/20 rounded-2xl blur-xl group-hover:bg-primary/30 transition-all"></div>
  <h1 class="text-3xl font-bold mb-6 flex items-center justify-center gap-3">Eng/
    <span>
      {{about?.name}}
    </span>
    </h1>

<div class="relative rounded-2xl overflow-hidden aspect-square bg-slate-800 border border-primary/20">
<img class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500" data-alt="Professional portrait of a developer in a modern office" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBk8ptGtOPlEKYO9MA4cdrGl_VAkz_ugRL_cn7lZt9BKcEw-LN7VQnN4gSRJ5huoDJT00KD9J8onIf2hQOhSkp4Eobj92_S-FUoFmaZliGIc0RWbS8-c5VtqthEDrDwDsOJ6DnZ--w6yPBWzTVbwDqZL-NSIGC2hGiyHVR2mfX_B_TNyJ-na22aEGkqk5_joYRQcgJNgfYUjCfmzOSgITjHfbbLY5mLG5hZAjnhxWp1UmR74jqnk-vPZnHJaRuHdlHLI85MN1xKrYll"/>
<img [src]="'http://localhost:3000/uploads/'+about?.portfolioImage" alt="">
</div>
</div>
<div>
<h2 class="text-3xl font-bold mb-6 flex items-center gap-3">
<span class="w-12 h-1 bg-primary rounded-full"></span>
                          About Me
                        </h2>
<p  class="text-slate-600 dark:text-slate-400 text-lg mb-6 leading-relaxed">
                          
                            {{about?.message}}
                        </p>

<div class="grid grid-cols-2 gap-6">
<div class="p-4 rounded-xl glass-panel">
<h4 class="text-primary font-bold text-2xl mb-1">
  +
<span> {{about?.yearsExperience}} </span>
</h4>
<p class="text-sm text-slate-500">Years Experience</p>
</div>
<div class="p-4 rounded-xl glass-panel">
<h4 class="text-primary font-bold text-2xl mb-1">
  +
{{about?.projectsDone}}
</h4>
<p class="text-sm text-slate-500">Projects Completed</p>
</div>
</div>
</div>
</div>
</div>
</section>
