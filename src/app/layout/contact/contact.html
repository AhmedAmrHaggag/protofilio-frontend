<section id="contact" class="py-24 px-6">
  <form  class="space-y-4 max-w-xl mx-auto">
<label for="name">name : </label>
    <input name="name" placeholder="Your Name" class="w-full p-3 rounded-xl glow-input"/>
    <label for="email">email : </label>
    <input  name="email" placeholder="Email" class="w-full p-3 rounded-xl glow-input"/>
     <label for="subject">subject : </label>
    <input  name="subject" placeholder="subject" class="w-full p-3 rounded-xl glow-input"/>
    <label for="message">message : </label>
  

    <textarea  name="message" rows="4" placeholder="Message" class="w-full p-3 rounded-xl glow-input"></textarea>
    <button type="submit" class="w-full bg-primary text-white py-3 rounded-xl">
      Send Message
    </button>
  </form>
  <div class="container">
    <h1>info about me</h1>
    <p>phone :
    <span> {{contact?.phone}} </span>
     <p>address :
    <span> {{contact?.address}} </span>
    </p>
    
  </div>
</section>
