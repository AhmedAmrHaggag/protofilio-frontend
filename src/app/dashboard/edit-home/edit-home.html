<div class="flex min-h-screen bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">

  <!-- Sidebar -->
  <aside class="w-72 border-r border-slate-200 dark:border-primary/20 bg-white dark:bg-background-dark flex flex-col fixed h-full">
    
    <div class="p-6 flex items-center gap-3">
      <div class="size-10 rounded-lg bg-primary flex items-center justify-center text-white">
        <span class="material-symbols-outlined">dashboard_customize</span>
      </div>
      <div>
        <h1 class="text-base font-bold">Portfolio CMS</h1>
        <p class="text-xs text-slate-500 dark:text-slate-400">Admin Dashboard</p>
      </div>
    </div>

    <nav class="flex-1 px-4 mt-4 space-y-1">
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary border border-primary/20">
        <span class="material-symbols-outlined">home</span>
        <span class="text-sm font-semibold">Home</span>
      </a>
    </nav>

  
  </aside>

  <!-- Main -->
  <main class="flex-1 ml-72">

    <!-- Header -->
    <header class="h-16 border-b border-slate-200 dark:border-primary/20 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-10 px-8 flex items-center justify-between">

      <h2 class="text-lg font-bold">Home Settings</h2>

      <button class="bg-primary text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow hover:opacity-90 transition">
        Publish Changes
      </button>

    </header>

    <!-- Content -->
    <div class="p-8 max-w-5xl">

      <h2 class="text-3xl font-black mb-6">Hero Section Settings</h2>

      <div class="bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/10 rounded-xl p-6 space-y-6">
            <form [formGroup]="form" class="form">
    <input type="text" formControlName="name" placeholder="Enter Your Name">
         <textarea type="text" formControlName="message" placeholder="Enter Your message"></textarea>
     
       <div class="buttons">

         <button 
        type="button" 
        class="edit-btn" 
        *ngIf="!isEditMode"
        (click)="enableEdit()">
        Edit
      </button>

        <button 
        type="button" 
        class="save-btn" 
        *ngIf="isEditMode"
        (click)="save()">
        Save
      </button>


       </div>

  </form>
      </div>

    </div>

  </main>

</div>
